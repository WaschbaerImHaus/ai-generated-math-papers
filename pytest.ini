[pytest]
# pytest-Konfiguration für das specialist-maths-Projekt
# Aktiviert parallele Test-Ausführung via pytest-xdist (-n auto)

# Parallele Ausführung: -n auto nutzt alle verfügbaren CPU-Kerne
# Für sequenzielle Ausführung: pytest ohne -n oder mit -n 0
addopts = -n auto --tb=short

# Test-Verzeichnis
testpaths = tests

# Mindest-Pytest-Version
minversion = 7.0

# Warnungen als Fehler behandeln (außer bestimmte bekannte Warnungen)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:test_benchmark_regression
    ignore::RuntimeWarning
